name: 🚀 Build VDub APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ✅ Accept Android Licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: 🔧 Install Gradle 8.10.2
        run: |
          if [ ! -d ~/.gradle/wrapper/dists/gradle-8.10.2-bin ]; then
            cd /tmp
            curl -sL https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -o gradle.zip
            unzip -q gradle.zip
            sudo mv gradle-8.10.2 /opt/gradle
            echo "/opt/gradle/bin" >> $GITHUB_PATH
          fi

      - name: 🏗️ Build Debug APK
        run: |
          cd $GITHUB_WORKSPACE
          gradle assembleDebug --no-daemon --stacktrace

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: VDub-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 📤 Upload Build Reports on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/reports/**
          retention-days: 7
